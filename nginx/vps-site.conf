# ThreatWatch AI — VPS nginx reverse proxy
# Deploy: copy to /etc/nginx/sites-available/threatwatch-ai
#         ln -s /etc/nginx/sites-available/threatwatch-ai /etc/nginx/sites-enabled/
#         certbot --nginx -d threatwatch-ai.nusabyte.cloud
#         nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name threatwatch-ai.nusabyte.cloud;

    # Certbot will add SSL block below this line automatically.
    # Until then, HTTP works on port 80.

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
