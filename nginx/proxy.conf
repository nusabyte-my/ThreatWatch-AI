upstream api {
    server api:8100;
}

upstream ui {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Frontend
    location / {
        proxy_pass http://ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # API docs
    location /docs {
        proxy_pass http://api/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://api/openapi.json;
        proxy_set_header Host $host;
    }
}
