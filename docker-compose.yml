services:
  db:
    image: postgres:16-alpine
    container_name: threatwatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: threatwatch
      POSTGRES_USER: threatwatch
      POSTGRES_PASSWORD: ${DB_PASSWORD:-threatwatch_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threatwatch-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://threatwatch:${DB_PASSWORD:-threatwatch_secret}@db:5432/threatwatch
      SECRET_KEY: ${SECRET_KEY:-changeme_in_prod}
      MODEL_PATH: /app/ml/model.pkl
      API_KEY: ${API_KEY:-changeme_api_key}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5080,http://127.0.0.1:5080,http://localhost:8100,http://127.0.0.1:8100,https://mail.google.com,null}
      ALLOWED_ORIGIN_REGEX: ${ALLOWED_ORIGIN_REGEX:-^(moz-extension|chrome-extension)://.*$}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,testserver}
      MAX_REQUEST_BYTES: ${MAX_REQUEST_BYTES:-3145728}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-480}
      AUTH_USERS_JSON: ${AUTH_USERS_JSON:-[{"username":"admin","password":"changeme_admin_password","role":"admin"}]}
      AGENT_PRIMARY_MODEL: ${AGENT_PRIMARY_MODEL:-gpt-4o-mini}
      AGENT_PIPELINE_ENABLED: ${AGENT_PIPELINE_ENABLED:-true}
      AGENT_LLM_TIMEOUT: ${AGENT_LLM_TIMEOUT:-15}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-512}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-75}
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY:-}
      GOOGLE_SAFE_BROWSING_TIMEOUT: ${GOOGLE_SAFE_BROWSING_TIMEOUT:-5}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./backend:/app
      - model_data:/app/ml
    ports:
      - "8100:8100"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m app.db.migrate &&
             python -m app.ml.train --seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload"

  frontend:
    image: nginx:alpine
    container_name: threatwatch-ui
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: threatwatch-proxy
    restart: unless-stopped
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5080:80"
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
  model_data:
