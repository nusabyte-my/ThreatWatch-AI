name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: threatwatch_test
          POSTGRES_USER: threatwatch
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords'); nltk.download('punkt'); nltk.download('punkt_tab')"

      - name: Run migrations + seed rules
        working-directory: backend
        env:
          DATABASE_URL: postgresql://threatwatch:testpassword@localhost:5432/threatwatch_test
          SECRET_KEY: test_secret_key
          MODEL_PATH: /tmp/model.pkl
          ALLOWED_ORIGINS: "http://localhost:3000"
          API_KEY: test_api_key
          DEBUG: "true"
        run: python -m app.db.migrate

      - name: Train model (seed data)
        working-directory: backend
        env:
          MODEL_PATH: /tmp/model.pkl
        run: python -m app.ml.train --seed

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://threatwatch:testpassword@localhost:5432/threatwatch_test
          SECRET_KEY: test_secret_key
          MODEL_PATH: /tmp/model.pkl
          ALLOWED_ORIGINS: "http://localhost:3000"
          API_KEY: test_api_key
          DEBUG: "true"
        run: pytest tests/ -v --tb=short
